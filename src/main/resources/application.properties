spring.datasource.url=${DB_URL:jdbc:h2:file:./data/presassistant}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true

server.port=8082
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=presassistant
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=presassistant

telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:asisstant_for_lecture_bot}

spring.config.import=optional:file:./secrets.properties

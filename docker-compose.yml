services:

  app:

    build: .
    container_name: pres_assistant_v2_app
    ports:
      - "8082:8082"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-asisstant_for_lecture_bot}
      HOST_USERPROFILE: "${USERPROFILE}"
      DB_URL: "jdbc:h2:file:/app/data/presassistant"
    volumes:
      - h2_data:/app/data
      - ${USERPROFILE}:/mnt/userprofile:ro

volumes:
  h2_data:
